name: CI

# Lint + test the patcher against a SYNTHETIC fixture. No game data is used or
# required (it can't legally live in CI), so this does not build a patched .bin.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: pip install pytest ruff
      - name: Lint
        run: ruff check src tests
      - name: Test (synthetic fixture)
        run: pytest -q

  build-bps-demo:
    # Demonstrates that the patcher + BPS encoder run end-to-end on a synthetic
    # blob and produces a tiny, game-code-free patch artifact.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build a demo BPS from the synthetic fixture
        run: pip install pytest && python -c "import sys; sys.path[:0]=['src','tests']; import test_patch as t, build_60fps_patch as p; s=t.make_fixture(); d=bytearray(s); p.apply_patches(d,'quarter'); open('demo.bps','wb').write(p.make_bps(bytes(s),bytes(d))); print('demo.bps bytes:', __import__('os').path.getsize('demo.bps'))"
      - uses: actions/upload-artifact@v4
        with:
          name: demo-bps
          path: demo.bps
